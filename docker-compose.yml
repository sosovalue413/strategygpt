services:
  strategygpt:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://strategygpt:strategygpt@postgres:5432/strategygpt
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: strategygpt
      POSTGRES_PASSWORD: strategygpt
      POSTGRES_DB: strategygpt
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
