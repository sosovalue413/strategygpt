apiVersion: apps/v1
kind: Deployment
metadata:
  name: strategygpt-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: strategygpt-ai
  template:
    metadata:
      labels:
        app: strategygpt-ai
    spec:
      containers:
        - name: web
          image: strategygpt-ai:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: strategygpt-ai-env
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: strategygpt-ai
spec:
  selector:
    app: strategygpt-ai
  ports:
    - name: http
      port: 80
      targetPort: 3000
